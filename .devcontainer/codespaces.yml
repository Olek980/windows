services:
  alpine:
    container_name: alpine
    image: mcr.microsoft.com/vscode/devcontainers/base:alpine
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
      - 5900:5900/tcp
    volumes:
      - ./windows:/storage
    restart: on-failure
    stop_grace_period: 2m
